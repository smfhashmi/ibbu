<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <title>Document</title>
</head>
<body>
  <h1>Fill up the college profile</h1>

  <form id="userForm">
    <div class="card">
      <div class="form-group">
        <label for="name">Name:</label>
        <br>
        <input type="text" class="form-control" id="name" name="name" required placeholder="enter your name"/>
      </div>
      <div class="form-group">
        <label for="age">Age:</label>
        <br>
        <input type="number" class="form-control" id="age" name="age" required placeholder="enter your age"/>
      </div>
      <div class="form-group">
        <label for="mobile">Mobile</label>
        <br>
        <input type="text" class="form-control" id="mobile" name="mobile" required placeholder="enter your mobile number"/>
      </div>
      <button class="btn" type="submit">Submit</button>
    </div>
  </form>


  <div id="details">

  </div>

  <script src="./index.js"></script>
</body>
</html>
