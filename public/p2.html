    <div class="container">
        <h1>Practicing styles via getbootstrap </h1>
        <form id="details">
            <div class="info">
                <div class="mb-3">
                    <label for="name" class="form-label">Name:</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name here">
                </div>
                <div class="mb-3">
                    <label for="subject" class="form-label">Subject:</label>
                    <input type="text" class="form-control" id="subject" name="subject"
                        placeholder="Enter you subject here">
                </div>
                <div class="mb-3">
                    <label for="hours per week" class="form-label">Hours per Week:</label>
                    <input type="text" class="form-control" id="hoursperweek" name="hoursperweek"
                        placeholder="Enter your hours here per week">
                </div>
                <div class="mb-3">
                    <label for="gender" class="form-label">Gender:</label>
                    <br>
                    <select name="gender" id="gender" class="form-select">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Not Qualified">Not Qualified</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="Highest Qualification" class="form-check-label">Highest Qualification

                    </label>
                <div class="form-check">
                    
                    <label for="form-check-label" for="ssc">SSC</label>
                    <input class="form-check-input" type="radio" name="ssc" id="ssc">

                </div>
                div
                <button class="btn btn-success" type="submit">Submit</button>
                </div>
            </div>
        </form>
