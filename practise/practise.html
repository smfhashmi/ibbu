<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./p.css">
    <title>Document</title>
</head>

<body>
    <h1> Fill in the Lecture Details</h1>
    <form id="class detials">
        <div class="info">
            <div class="editing">
                <label for="name">name:</label>
                <br>
                <input type="text" class="editing-control" id="name" name="name" placeholder="enter your name here">
            </div>
            <div class="editing">
                <label for="subject">subject:</label>
                <br>
                <input type="text" class="editing-control" id="subject" subject="mathematics"
                    placeholder="which subject">
            </div>
            <div class="editing">
                <label for="hours per week">hours per week:</label>
                <br>
                <input type="text" class="editing-control" id="hours per week" period="number of hours per week"
                    placeholder="hours per week">
            </div>
            <button class="btn" type="submit">sumbit</button>
        </div>

    </form>
    <div id="details"></div>
    <script src="./p.js"></script>
</body>

</html>
